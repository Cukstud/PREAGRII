{% extends 'layout.html' %}
{% block body %}

<style>
    /* Custom CSS styles */
    body {
        background-image: url('static/images/IMG_8059.jpg');
        background-size: cover; /* Cover the entire viewport */
        background-position: center; /* Center the background image */
        font-family: Arial, sans-serif; /* Change the font family */
    }
     .background-overlay {
        position: absolute; /* Position the overlay */
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(255, 255, 255, 0.5); /* Semi-transparent white overlay */
        z-index: 1; /* Ensure the overlay is behind the content */
    }
    .tab-content {
        background-color: rgba(255, 255, 255, 0.9); /* Add a semi-transparent white background */

    }
    .nav-tabs .nav-link {
        color: #ffffff; /* White */
        font-weight: bold;
    background-color: #4CAF50; /* Light green */
    font-family:  Georgia, serif;
    }
    .nav-tabs .nav-link.active {
        color: #fff; /* White */
        background-color: #4CAF50; /* Light green */
    }
    .card {
        background-color: #f0f0f0; /* Light gray */
        border: 1px solid #ccc; /* Light gray border */

    }
    .card-body {
        color: #000000; /* Dark gray */
    }
</style>

<div class="container py-2 mx-auto my-50 h-10" style="margin: 9rem;">
    <!-- Horizontal tab layout for prediction -->
    <ul class="nav nav-tabs">
        <li class="nav-item">
            <a class="nav-link active" data-toggle="tab" href="#prediction">Prediction</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" data-toggle="tab" href="#cause">Cause of Disease</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" data-toggle="tab" href="#prevention">Prevention Methods</a>
        </li>
    </ul>

    <!-- Tab content -->
    <div class="tab-content">
        <!-- Prediction tab -->
        <div class="tab-pane container active" id="prediction">
            <div class="card card-body" style="justify-content: center;">
                <h3 class="text-center">Prediction:</h3>
                <p class="text-center" style="font-size: 22px;"><strong>{{ prediction }}</strong></p>
            </div>
        </div>
        <!-- Cause of Disease tab -->
        <div class="tab-pane container fade" id="cause">
            <div class="card card-body" style="justify-content: center;">
                <h3 class="text-center">Cause of Disease:</h3>
                <p class="text-center" style="font-size: 22px;">{{ cause_of_disease | safe }}</p>
            </div>
        </div>
        <!-- Prevention Methods tab -->
        <div class="tab-pane container fade" id="prevention">
            <div class="card card-body" style="justify-content: center;">
                <b></B><h3 class="text-center">Prevention Methods:</h3></b>
                <p class="text-center" style="font-size: 22px;">{{ prevention_methods | safe }}</p>
            </div>
        </div>
    </div>
</div>


{% endblock %}
